name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      debug:
        description: Enable debug mode
        required: false
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Checks (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: stable
          components: rustfmt,clippy,llvm-tools-preview
          cache: true
          cache-workspaces: true

      - name: Run fmt check
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        if: github.event_name == 'pull_request'
        run: cargo test --all --no-fail-fast

      - name: Install cargo-llvm-cov
        if: github.event_name != 'pull_request'
        run: cargo install cargo-llvm-cov --locked

      - name: Run tests with coverage
        if: github.event_name != 'pull_request'
        env:
          CARGO_INCREMENTAL: 0
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --no-fail-fast

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v6
        with:
          files: ./lcov.info
          flags: coverage
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build_binaries:
    name: Build ${{ matrix.platform.os_name }}
    if: github.event_name == 'release'
    needs: checks
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: intervals_icu_mcp_linux_x86_64
            docker_artifact: docker-linux-amd64
          - os_name: Linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: intervals_icu_mcp_linux_arm64
            docker_artifact: docker-linux-arm64
          - os_name: macOS-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin: intervals_icu_mcp_macos_x86_64
            docker_artifact: ""
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: intervals_icu_mcp_macos_aarch64
            docker_artifact: ""
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: intervals_icu_mcp_windows_x86_64.exe
            docker_artifact: ""
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain (with cache)
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: stable
          cache: true
          cache-workspaces: true
          target: ${{ matrix.platform.target }}

      - name: Build binary
        run: cargo build -p intervals_icu_mcp --release --target ${{ matrix.platform.target }}

      - name: Prepare artifact (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: |
          mkdir -p app/${{ matrix.platform.target }}
          if [ ! -f app/${{ matrix.platform.target }}/${{ matrix.platform.bin }} ]; then
            cp target/${{ matrix.platform.target }}/release/intervals_icu_mcp app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}
          fi

      - name: Prepare artifact (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path app/${{ matrix.platform.target }}
          Copy-Item target/${{ matrix.platform.target }}/release/intervals_icu_mcp.exe app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}

      - name: Generate SHA-256 (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: |
          shasum -a 256 app/${{ matrix.platform.target }}/${{ matrix.platform.bin }} | cut -d ' ' -f 1 > app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}.sha256

      - name: Generate SHA-256 (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          (Get-FileHash -Algorithm SHA256 app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}).Hash.ToLower() | Out-File -Encoding ascii app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}.sha256

      - name: Upload Docker binary artifact
        if: matrix.platform.docker_artifact != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.docker_artifact }}
          path: app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}
            app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_docker_images:
    name: Build Docker images
    if: github.event_name == 'release'
    needs: build_binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: docker-linux-amd64
          path: dist/linux/amd64

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: docker-linux-arm64
          path: dist/linux/arm64

      - name: Normalize Docker binary names
        run: |
          mv dist/linux/amd64/intervals_icu_mcp_linux_x86_64 dist/linux/amd64/intervals_icu_mcp
          mv dist/linux/arm64/intervals_icu_mcp_linux_arm64 dist/linux/arm64/intervals_icu_mcp
          chmod +x dist/linux/amd64/intervals_icu_mcp dist/linux/arm64/intervals_icu_mcp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rusty-intervals-mcp:latest
            ghcr.io/${{ github.repository_owner }}/rusty-intervals-mcp:${{ github.ref_name }}
