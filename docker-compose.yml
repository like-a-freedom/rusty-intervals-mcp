services:
  intervals_icu_mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/like-a-freedom/rusty-intervals-mcp:latest
    container_name: intervals_icu_mcp
    ports:
      - "3000:3000"
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_ADDRESS: ${MCP_HTTP_ADDRESS:-0.0.0.0:3000}
      MAX_HTTP_BODY_SIZE: ${MAX_HTTP_BODY_SIZE:-4194304}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
      IDLE_TIMEOUT_SECONDS: ${IDLE_TIMEOUT_SECONDS:-60}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-7776000}
      JWT_MASTER_KEY: ${JWT_MASTER_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
      INTERVALS_ICU_BASE_URL: ${INTERVALS_ICU_BASE_URL:-https://intervals.icu}
      INTERVALS_ICU_ATHLETE_ID: ${INTERVALS_ICU_ATHLETE_ID:-""}
      INTERVALS_ICU_API_KEY: ${INTERVALS_ICU_API_KEY:-""}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
